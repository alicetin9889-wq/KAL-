<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İkra 💞</title>

<style>

body{
margin:0;
padding:0;
overflow:hidden;
font-family:Arial,sans-serif;
background:black;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.background{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,#ff4d88,#ff7aa8,#ffd1dc);
animation:bg 8s infinite alternate;
z-index:-2;
}

@keyframes bg{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(25deg);}
}

.heart{
position:absolute;
font-size:25px;
animation:float 8s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-120vh);
opacity:1;
}
}

.container{
width:88%;
max-width:420px;
background:rgba(255,255,255,0.15);
padding:25px;
border-radius:30px;
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(255,255,255,0.3);
animation:fade 1s;
}

@keyframes fade{
from{
opacity:0;
transform:scale(0.9);
}
to{
opacity:1;
transform:scale(1);
}
}

button{
padding:14px 24px;
border:none;
border-radius:25px;
font-size:18px;
font-weight:bold;
background:white;
color:#ff2e63;
margin-top:20px;
cursor:pointer;
}

img{
width:230px;
border-radius:22px;
margin-top:15px;
box-shadow:0 0 25px rgba(255,255,255,0.5);
animation:spin 7s infinite alternate;
}

@keyframes spin{
0%{
transform:rotate(-2deg) scale(1);
}
100%{
transform:rotate(2deg) scale(1.05);
}
}

.ikos{
position:absolute;
opacity:0.15;
font-size:20px;
animation:rotate 10s linear infinite;
}

@keyframes rotate{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="background"></div>

<div class="heart" style="left:10%">💞</div>
<div class="heart" style="left:25%;animation-delay:2s;">💕</div>
<div class="heart" style="left:50%;animation-delay:4s;">💖</div>
<div class="heart" style="left:75%;animation-delay:1s;">💘</div>
<div class="heart" style="left:90%;animation-delay:5s;">💗</div>

<div class="ikos" style="top:10%;left:5%;">ikos 💞</div>
<div class="ikos" style="top:70%;left:75%;">Ali + İkra 💖</div>

<div class="container">

<div id="content">

<h1 style="font-size:42px;">💌 Gizli Dosya</h1>

<p style="font-size:20px;line-height:32px;">

İkra için hazırlanmış özel doğum günü dosyası açılıyor... 💞

</p>

<button onclick="scene1()">

Başlat 💖

</button>

</div>

</div>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8e4b6f0.mp3?filename=romantic-piano-11086.mp3" type="audio/mp3">
</audio>

<script>

function scene1(){

document.getElementById("content").innerHTML = `

<h2 style="color:#ff0055;">
💖 Küçük Bir Soru
</h2>

<p style="font-size:20px;line-height:32px;">

Ali’nin sevmediği şey ne? 😭

</p>

<button onclick="scene2()">
Mobil oyunlar
</button>

<br>

<button onclick="wrong()">
Tost ekmeği
</button>

`;

}

function wrong(){

alert("Jack bile bunu çözdü 😭");

}

function scene2(){

document.getElementById("content").innerHTML = `

<h2 style="color:#ff2e63;">
Hot Wheels Kızı 🚗💞
</h2>

<p style="font-size:18px;line-height:32px;">

Seninle yaptığımız Hot Wheels muhabbetleri,<br>
random konuşmalarımız,<br>
saçma kahkahalarımız falan 😭<br><br>

İstemeden günümün en güzel kısmı oldu.
</p>

<button onclick="scene3()">
Devam 💌
</button>

`;

}

function scene3(){

document.getElementById("content").innerHTML = `

<h2 style="color:#ff0055;">
Jack & Kate Onayı 💞
</h2>

<img src="https://upload.wikimedia.org/wikipedia/en/thumb/9/9d/Jack_and_Kate.jpg/640px-Jack_and_Kate.jpg">

<p style="font-size:18px;line-height:32px;">

Bak onlar bile sizi onaylıyor 😭💖

</p>

<button onclick="scene4()">
Devam Et 💕
</button>

`;

}

function scene4(){

document.getElementById("content").innerHTML = `

<h2 style="color:#ff2e63;">
Küçük Bir İtiraf 💌
</h2>

<img src="https://upload.wikimedia.org/wikipedia/en/5/52/Jack_Shephard.jpg">

<p style="font-size:18px;line-height:34px;">

Belki bazen fazla kıskanıyorum 😭<br><br>

Şu mobil oyun olayını sevmememin sebebi bile biraz bu.<br><br>

Çünkü seni diğer insanlardan biraz daha farklı görüyorum 💞
</p>

<button onclick="scene5()">
Devam 💖
</button>

`;

}

function scene5(){

document.getElementById("content").innerHTML = `

<h2 style="color:#ff0055;">
💞 Bir Şey Daha
</h2>

<p style="font-size:19px;line-height:35px;">

Fenerbahçeli olmanla,<br>
yeşil gözlerinle,<br>
beni sinir etmenle,<br>
random oluşunla bile güzelsin 😭💖<br><br>

Ve sanırım...<br><br>

Seninle kurduğum hayalleri kimseyle değişmem.
</p>

<button onclick="finalScene()">
Son Mesaj 💌
</button>

`;

}

function finalScene(){

document.getElementById("content").innerHTML = `

<h1 style="
font-size:42px;
color:#ff0055;
text-shadow:0 0 20px white;
">

Seni Seviyorum 💞

</h1>

<h2 style="margin-top:20px;">
İyi ki doğdun İkra
</h2>

<p style="
font-size:20px;
line-height:36px;
margin-top:25px;
">

Bazı insanlar normal biri gibi girer hayatına...<br><br>

Sonra fark etmeden gününün en güzel kısmı olurlar 💖
</p>

<h2 style="
margin-top:35px;
color:#ffe6ee;
">

— Ali

</h2>

`;

}

</script>

</body>
</html>
